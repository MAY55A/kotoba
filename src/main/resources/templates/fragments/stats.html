<div class="stats" th:fragment="stats">
    <h2>Stats</h2>
    <div class="stats-container">

        <div class="stat-card">
            <div class="stat-header">
                <span class="label">Total XP</span>
                <span class="value" id="xp"></span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-header">
                <span class="label">Accuracy</span>
                <span class="value" id="accuracy"></span>
            </div>
            <div class="progress">
                <div aria-valuemax="100" aria-valuemin="0" aria-valuenow="0" class="progress-bar"
                     id="accuracy-bar" role="progressbar" style="width: 0"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-header">
                <span class="label">Kanji Learned</span>
                <span class="value" id="total-kanji"></span>
            </div>
            <div class="progress">
                <div aria-valuemax="100" aria-valuemin="0" aria-valuenow="0" class="progress-bar"
                     id="total-kanji-bar" role="progressbar" style="width: 0"></div>
            </div>
        </div>

    </div>
</div>
