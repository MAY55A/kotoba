<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="initial-scale=1, maximum-scale=1" name="viewport">
    <link rel="shortcut icon" th:href="@{/icons/kotoba.jpeg}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/learn.css}">
    <title>KOTOBA | LEARN</title>
</head>
<body>
<header th:replace="fragments/navbar :: navbar(${currentPath})"></header>
<main>
    <nav th:replace="fragments/sidebar :: sidebar(${currentPath})"></nav>
    <section>
        <h1>Continue your learning path and unlock all the grades</h1>
        <div class="grades-wrapper">
            <ul class="grades">
                <li>
                    <div class="grade" data-grade="1">
                        <a>
                            <h2>Grade 1</h2>
                            <span class="status"></span>
                        </a>
                    </div>
                </li>
                <li>
                    <div class="grade" data-grade="2">
                        <a>
                            <h2>Grade 2</h2>
                            <span class="status"></span>
                        </a>
                    </div>
                </li>
                <li>
                    <div class="grade" data-grade="3">
                        <a>
                            <h2>Grade 3</h2>
                            <span class="status"></span>
                        </a>
                    </div>
                </li>
                <li>
                    <div class="grade" data-grade="4">
                        <a>
                            <h2>Grade 4</h2>
                            <span class="status"></span>
                        </a>
                    </div>
                </li>
                <li>
                    <div class="grade" data-grade="5">
                        <a>
                            <h2>Grade 5</h2>
                            <span class="status"></span>
                        </a>
                    </div>
                </li>
                <li>
                    <div class="grade" data-grade="6">
                        <a>
                            <h2>Grade 6</h2>
                            <span class="status"></span>
                        </a>
                    </div>
                </li>
            </ul>
            <div class="center-circle">
                <img alt="fox reading a book" th:src="@{/images/mascot/study.png}">
            </div>
        </div>
        <div class="progress-info">
            <div th:replace="fragments/stats"></div>
            <div>
                <h2>Achievements</h2>
                <div id="achievements"></div>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/scripts/pages/learnPage.js}" type="module"></script>
</body>
</html>
