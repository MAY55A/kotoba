<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="initial-scale=1, maximum-scale=1" name="viewport">
    <link rel="shortcut icon" th:href="@{/icons/kotoba.jpeg}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/kanji_test.css}">
    <title th:text="'KOTOBA | Grade ' + ${grade} + ' | Test ' + ${test}">Kotoba | Test</title>
</head>
<body>
<main>
    <div class="modal-overlay" id="loading">
        <div>
            <div class="spinner"></div>
            <p>Generating test, please wait...</p>
        </div>
    </div>
    <div class="modal-overlay hidden" id="start">
        <div>
            <span th:text="'Grade ' + ${grade}"></span><br/>
            <span th:text="'Test ' + ${test}"></span><br/>
            <button id="start-btn">Start</button>
        </div>
    </div>
    <input id="grade" th:value="${grade}" type="hidden"/>
    <input id="test" th:value="${test}" type="hidden"/>
    <a class="go-back" id="x" title="exit">x</a>
    <div class="modal-overlay hidden" id="confirmation-modal">
        <div class="popup-modal">
            <p>If you exit the test now you will lose your progress !</p>
            <button id="exit">exit</button>
            <button id="cancel">cancel</button>
        </div>
    </div>
    <div class="progress">
        <div aria-valuemax="100" aria-valuemin="0"
             class="progress-bar progress-bar-striped progress-bar-animated bg-warning" id="progress-bar"
             role="progressbar"></div>
    </div>
    <header>
        <p id="text"></p>
        <h1 id="word"></h1>
    </header>
    <div id="test-content">
        <section></section>
        <div id="question-result"></div>
    </div>
    <div class="modal-overlay hidden" id="test-result-modal">
        <div id="test-result"></div>
    </div>
    <footer>
        <button class="check" id="next">check</button>
    </footer>
    <script th:src="@{/scripts/pages/learnTestPage.js}" type="module"></script>
</main>
</body>
</html>
