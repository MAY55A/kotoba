<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="initial-scale=1, maximum-scale=1" name="viewport">
    <link rel="shortcut icon" th:href="@{/icons/kotoba.jpeg}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/quiz.css}">
    <title>KOTOBA | Test Your Level</title>
</head>
<body>
<header th:replace="fragments/navbar :: navbar(${currentPath})"></header>
<main>
    <section>
        <h1>Test Your Japanese Level</h1>
        <p>Take a quiz covering all grades to evaluate your level.</p>

        <img alt="quiz mascot" id="quiz-mascot" th:src="@{/images/mascot/quiz.png}">

        <div class="question-select">
            <label>Number of Questions</label>

            <div class="options">
                <label class="option-card">
                    <input checked name="questionCount" type="radio" value="20">
                    20 questions
                </label>
                <label class="option-card">
                    <input name="questionCount" type="radio" value="40">
                    40 questions
                </label>
                <label class="option-card">
                    <input name="questionCount" type="radio" value="60">
                    60 questions
                </label>
                <label class="option-card">
                    <input name="questionCount" type="radio" value="80">
                    80 questions
                </label>

            </div>
            <p class="hint">💡 More questions = more accurate level</p>
        </div>

        <button id="start-quiz">
            Start Quiz
        </button>
    </section>
</main>
<script th:src="@{/scripts/pages/quizSetupPage.js}" type="module"></script>
</body>
</html>
