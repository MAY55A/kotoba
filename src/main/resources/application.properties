spring.application.name=KOTOBA

# Database
## Used "Session Pooler" method instead of "Direct Connection", because the last method doesn't support IPv4 networks
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:5432/postgres 
spring.datasource.username=postgres.mjaavsahgsprbcfwxped
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_AUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_AUTH_CLIENT_SECRET}

# RapidAPI
rapidapi.key=${RAPIDAPI_KEY}
rapidapi.host=kanjialive-api.p.rapidapi.com

# Cache
spring.cache.type=caffeine
spring.cache.cache-names=kanjiDetailsCache,gradeKanjiCache,offsetWordCache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=12h

# Logging
logging.level.org.springframework.security=TRACE

# Server error handling
server.error.whitelabel.enabled=false
server.error.path=/error

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.profiles.active=local